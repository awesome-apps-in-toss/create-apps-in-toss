<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1000px;
      height: 1000px;
      overflow: hidden;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(160deg, #3182F6 0%, #1B64DA 100%);
    }

    .container {
      width: 1000px;
      height: 1000px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 64px;
    }

    /* 배경 장식 */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
    }
    .bg-c1 { width: 500px; height: 500px; top: -120px; right: -80px; }
    .bg-c2 { width: 340px; height: 340px; bottom: -60px; left: -60px; }
    .bg-c3 { width: 180px; height: 180px; top: 200px; left: 80px; }

    /* 상단 텍스트 */
    .text-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      padding: 12px 36px;
    }

    .badge-text {
      font-size: 30px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 88px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -3px;
    }

    /* 모바일 목업 */
    .mockup-area {
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-frame {
      width: 300px;
      height: 520px;
      background: #1A1A2E;
      border-radius: 48px;
      padding: 13px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.15),
        0 24px 72px rgba(0, 0, 0, 0.5);
      position: relative;
    }

    .phone-notch {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 24px;
      background: #1A1A2E;
      border-radius: 12px;
      z-index: 10;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      border-radius: 37px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .app-bar {
      height: 52px;
      background: white;
      display: flex;
      align-items: flex-end;
      padding: 0 16px 11px;
      flex-shrink: 0;
      margin-top: 24px;
    }

    .back-icon {
      width: 9px;
      height: 9px;
      border-left: 2px solid #191F28;
      border-bottom: 2px solid #191F28;
      transform: rotate(45deg);
      margin-left: 3px;
      margin-right: 10px;
    }

    .app-bar-title {
      font-size: 16px;
      font-weight: 600;
      color: #191F28;
    }

    .screen-content {
      flex: 1;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .screen-card {
      background: white;
      border-radius: 16px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .screen-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #191F28;
    }

    .screen-card-desc {
      font-size: 13px;
      color: #4E5968;
    }

    .nav-bar {
      height: 52px;
      background: white;
      border-top: 1px solid #E5E8EB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-dot {
      width: 18px;
      height: 18px;
      border-radius: 5px;
      background: #3182F6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-circle bg-c1"></div>
    <div class="bg-circle bg-c2"></div>
    <div class="bg-circle bg-c3"></div>

    <div class="text-area">
      <div class="badge">
        <span class="badge-text">토스 미니앱</span>
      </div>
      <div class="title">샘플2</div>
    </div>

    <div class="mockup-area">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="app-bar">
            <div class="back-icon"></div>
            <div class="app-bar-title">샘플2</div>
          </div>
          <div class="screen-content">
            <div class="screen-card">
              <div class="screen-card-title">sample</div>
              <div class="screen-card-desc">새 미니앱입니다.</div>
            </div>
          </div>
          <div class="nav-bar">
            <div class="nav-dot"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
