<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1932px;
      height: 828px;
      overflow: hidden;
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #3182F6 0%, #1B64DA 100%);
    }

    .container {
      width: 1932px;
      height: 828px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 180px;
    }

    /* 배경 장식 */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
    }
    .bg-c1 { width: 560px; height: 560px; top: -160px; right: 580px; }
    .bg-c2 { width: 380px; height: 380px; bottom: -120px; right: 380px; }
    .bg-c3 { width: 240px; height: 240px; top: 100px; left: 540px; }

    /* 왼쪽 텍스트 영역 */
    .text-area {
      display: flex;
      flex-direction: column;
      gap: 28px;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      padding: 12px 32px;
      width: fit-content;
    }

    .badge-text {
      font-size: 28px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.3px;
    }

    .title {
      font-size: 100px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -3px;
    }

    .subtitle {
      font-size: 36px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.72);
      line-height: 1.55;
      letter-spacing: -0.3px;
    }

    /* 오른쪽 모바일 목업 */
    .mockup-area {
      z-index: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 폰 프레임 */
    .phone-frame {
      width: 320px;
      height: 620px;
      background: #1A1A2E;
      border-radius: 52px;
      padding: 14px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.15),
        0 32px 80px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    /* 상단 노치 */
    .phone-notch {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 28px;
      background: #1A1A2E;
      border-radius: 14px;
      z-index: 10;
    }

    /* 화면 영역 */
    .phone-screen {
      width: 100%;
      height: 100%;
      background: #f5f5f5;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 앱바 */
    .app-bar {
      height: 56px;
      background: white;
      display: flex;
      align-items: flex-end;
      padding: 0 16px 12px;
      flex-shrink: 0;
      margin-top: 28px;
    }

    .app-bar-back {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-icon {
      width: 10px;
      height: 10px;
      border-left: 2.5px solid #191F28;
      border-bottom: 2.5px solid #191F28;
      transform: rotate(45deg);
      margin-left: 4px;
    }

    .app-bar-title {
      font-size: 17px;
      font-weight: 600;
      color: #191F28;
      margin-left: 8px;
    }

    /* 컨텐츠 */
    .screen-content {
      flex: 1;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 카드 */
    .screen-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .screen-card-title {
      font-size: 17px;
      font-weight: 600;
      color: #191F28;
    }

    .screen-card-desc {
      font-size: 14px;
      color: #4E5968;
    }

    /* 네비게이션 바 */
    .nav-bar {
      height: 56px;
      background: white;
      border-top: 1px solid #E5E8EB;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .nav-dot {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: #3182F6;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: #3182F6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="bg-circle bg-c1"></div>
    <div class="bg-circle bg-c2"></div>
    <div class="bg-circle bg-c3"></div>

    <div class="text-area">
      <div class="badge">
        <span class="badge-text">토스 미니앱</span>
      </div>
      <div class="title">샘플2</div>
      <div class="subtitle">간단한 샘플 미니앱<br>토스에서 바로 사용해보세요</div>
    </div>

    <div class="mockup-area">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="app-bar">
            <div class="app-bar-back">
              <div class="back-icon"></div>
            </div>
            <div class="app-bar-title">샘플2</div>
          </div>
          <div class="screen-content">
            <div class="screen-card">
              <div class="screen-card-title">sample</div>
              <div class="screen-card-desc">새 미니앱입니다.</div>
            </div>
          </div>
          <div class="nav-bar">
            <div class="nav-item">
              <div class="nav-dot"></div>
              <div class="nav-label">홈</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
